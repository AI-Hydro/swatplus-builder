name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev only, no GIS stack)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src/ tests/

      # Type checking is advisory while the strict-mypy type debt is paid down
      # incrementally (~350 findings tracked separately). It runs and reports on
      # every push but does not block the build.
      - name: Mypy (advisory)
        run: mypy src/
        continue-on-error: true

      - name: Smoke tests
        run: pytest -q tests/test_smoke.py

      - name: No-QGIS guard
        run: |
          if grep -rE "(^|[^#])[[:space:]]*(import|from)[[:space:]]+qgis" src/; then
            echo "QGIS import detected — swatplus-builder must remain QGIS-free."
            exit 1
          fi

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Smoke
        run: pytest -q tests/test_smoke.py

  routing-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          # libgomp1: OpenMP runtime that the pre-compiled WBT binary links against
          sudo apt-get install -y unzip openmpi-bin libgomp1

      - name: Install Python deps (full stack)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      # Cache the downloaded WBT binary across runs.  The cache key includes the
      # whitebox-python version so a package upgrade automatically re-downloads.
      - name: Cache WhiteboxTools binary
        id: cache-wbt
        uses: actions/cache@v4
        with:
          path: ~/.cache/whitebox_wbt
          key: wbt-linux-amd64-${{ hashFiles('**/pyproject.toml') }}

      - name: Pre-download WhiteboxTools binary
        run: |
          set -euo pipefail
          WBT_PKG_DIR=$(python -c "import whitebox, os; print(os.path.dirname(os.path.abspath(whitebox.__file__)))")
          WBT_CACHE=~/.cache/whitebox_wbt
          WBT_EXE="${WBT_PKG_DIR}/whitebox_tools"

          if [ -f "${WBT_CACHE}/whitebox_tools" ]; then
            echo "Restoring cached WBT binary."
            mkdir -p "${WBT_PKG_DIR}/WBT"
            cp "${WBT_CACHE}/whitebox_tools" "${WBT_EXE}"
            cp "${WBT_CACHE}/whitebox_tools" "${WBT_PKG_DIR}/WBT/whitebox_tools"
            chmod +x "${WBT_EXE}" "${WBT_PKG_DIR}/WBT/whitebox_tools"
          else
            echo "Downloading WhiteboxTools Linux binary via whitebox-python's own download logic..."
            # whitebox.download_wbt() fetches from whiteboxgeo.com (latest, compatible with
            # whitebox-python 2.3.x). The giswqs/whitebox-bin mirror is stuck at v2.0.0 and
            # incompatible — avoid it. We retry 3 times at the curl level to handle transient
            # network issues.
            python -c "
import whitebox, os, sys
try:
    whitebox.download_wbt(verbose=True)
    print('download_wbt() completed')
except Exception as e:
    print(f'download_wbt() raised: {e}', file=sys.stderr)
    # Try direct curl as a last resort — same URL, with retry
    pkg_dir = os.path.dirname(os.path.abspath(whitebox.__file__))
    url = 'https://www.whiteboxgeo.com/WBT_Linux/WhiteboxTools_linux_amd64.zip'
    import subprocess, zipfile, shutil, tempfile, pathlib
    out = pathlib.Path(tempfile.mkdtemp()) / 'wbt.zip'
    subprocess.run(['curl', '--retry', '3', '--retry-delay', '5', '-L', '-o', str(out), url], check=True)
    with zipfile.ZipFile(out) as zf:
        zf.extractall(pkg_dir)
    # Locate the extracted binary
    for p in pathlib.Path(pkg_dir).rglob('whitebox_tools'):
        if p.is_file() and 'WBT' in p.parts:
            p.chmod(p.stat().st_mode | 0o111)
            shutil.copy2(p, pkg_dir + '/whitebox_tools')
            shutil.copy2(p, pkg_dir + '/WBT/whitebox_tools')
            print(f'Installed from curl fallback: {p}')
            break
"
            # Persist to cache for subsequent runs
            mkdir -p "${WBT_CACHE}"
            cp "${WBT_EXE}" "${WBT_CACHE}/whitebox_tools"
          fi

          # Verify the binary runs and report version
          WBT_VERSION=$("${WBT_EXE}" --version 2>&1 | head -1)
          echo "WBT binary: ${WBT_VERSION}"
          # Fail if we ended up with the old v2.0.0 backup binary (incompatible)
          if echo "${WBT_VERSION}" | grep -q "v2\.0\.0"; then
            echo "ERROR: WBT v2.0.0 is incompatible with whitebox-python 2.3.x. Download from whiteboxgeo.com failed."
            exit 1
          fi

      - name: Bootstrap SWAT+ Linux engine (pinned release asset)
        run: |
          mkdir -p bin
          curl -L -o /tmp/swatplus-linux.zip \
            https://github.com/swat-model/swatplus/releases/download/61.0.2/swatplus-61.0.2-ifx-lin_x86_64-Rel.zip
          unzip -o /tmp/swatplus-linux.zip -d /tmp
          cp /tmp/swatplus-61.0.2-ifx-lin_x86_64-Rel bin/swatplus_exe
          chmod +x bin/swatplus_exe

      - name: Routing regression gate (multi-basin)
        env:
          SWATPLUS_BUILDER_RUN_ROUTING_REGRESSION: "1"
          # Tell whitebox.download_wbt() to skip auto-download since we've
          # already placed the binary in the package directory above.
          WBT_PATH: "1"
        run: |
          pytest -q tests/test_ci_routing_regression.py -s
