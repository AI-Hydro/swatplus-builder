name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev only, no GIS stack)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src/ tests/

      # Type checking is advisory while the strict-mypy type debt is paid down
      # incrementally (~350 findings tracked separately). It runs and reports on
      # every push but does not block the build.
      - name: Mypy (advisory)
        run: mypy src/
        continue-on-error: true

      - name: Smoke tests
        run: pytest -q tests/test_smoke.py

      - name: No-QGIS guard
        run: |
          if grep -rE "(^|[^#])[[:space:]]*(import|from)[[:space:]]+qgis" src/; then
            echo "QGIS import detected — swatplus-builder must remain QGIS-free."
            exit 1
          fi

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Smoke
        run: pytest -q tests/test_smoke.py

# The live multi-basin routing-regression integration test (full build + SWAT+
# engine run against ~6 external services) runs nightly in
# .github/workflows/nightly-integration.yml — it is intentionally NOT a blocking
# per-push gate, since any upstream-service outage would otherwise red the build.
