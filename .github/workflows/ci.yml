name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev only, no GIS stack)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src/ tests/

      # Type checking is advisory while the strict-mypy type debt is paid down
      # incrementally (~350 findings tracked separately). It runs and reports on
      # every push but does not block the build.
      - name: Mypy (advisory)
        run: mypy src/
        continue-on-error: true

      - name: Smoke tests
        run: pytest -q tests/test_smoke.py

      - name: No-QGIS guard
        run: |
          if grep -rE "(^|[^#])[[:space:]]*(import|from)[[:space:]]+qgis" src/; then
            echo "QGIS import detected — swatplus-builder must remain QGIS-free."
            exit 1
          fi

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Smoke
        run: pytest -q tests/test_smoke.py

  routing-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          # libgomp1: OpenMP runtime that the pre-compiled WBT binary links against
          sudo apt-get install -y unzip openmpi-bin libgomp1

      - name: Install Python deps (full stack)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      # Cache the downloaded WBT binary across runs.  The cache key includes the
      # whitebox-python version so a package upgrade automatically re-downloads.
      - name: Cache WhiteboxTools binary
        id: cache-wbt
        uses: actions/cache@v4
        with:
          path: ~/.cache/whitebox_wbt
          key: wbt-linux-amd64-${{ hashFiles('**/pyproject.toml') }}

      - name: Pre-download WhiteboxTools binary
        run: |
          set -euo pipefail
          WBT_PKG_DIR=$(python -c "import whitebox, os; print(os.path.dirname(os.path.abspath(whitebox.__file__)))")
          WBT_CACHE=~/.cache/whitebox_wbt
          WBT_EXE="${WBT_PKG_DIR}/whitebox_tools"

          if [ -f "${WBT_CACHE}/whitebox_tools" ]; then
            echo "Using cached WBT binary."
            cp "${WBT_CACHE}/whitebox_tools" "${WBT_EXE}"
            chmod +x "${WBT_EXE}"
            # Restore the WBT/ subdirectory if the whitebox package needs it
            mkdir -p "${WBT_PKG_DIR}/WBT"
            cp "${WBT_CACHE}/whitebox_tools" "${WBT_PKG_DIR}/WBT/whitebox_tools"
            chmod +x "${WBT_PKG_DIR}/WBT/whitebox_tools"
          else
            echo "Downloading WhiteboxTools Linux binary..."
            # Use the GitHub backup mirror — whiteboxgeo.com primary frequently
            # times out in CI (noted in whitebox-python source code).
            BACKUP_URL="https://github.com/giswqs/whitebox-bin/raw/master/WhiteboxTools_linux_amd64.zip"
            PRIMARY_URL="https://www.whiteboxgeo.com/WBT_Linux/WhiteboxTools_linux_amd64.zip"
            curl -fsSL -o /tmp/wbt_linux.zip "${BACKUP_URL}" \
              || curl -fsSL -o /tmp/wbt_linux.zip "${PRIMARY_URL}"
            unzip -o /tmp/wbt_linux.zip -d /tmp/wbt_extract
            # The zip extracts to WhiteboxTools_linux_amd64/WBT/whitebox_tools
            find /tmp/wbt_extract -name "whitebox_tools" -type f | head -1 \
              | xargs -I{} cp {} "${WBT_EXE}"
            chmod +x "${WBT_EXE}"
            # Also populate WBT/ subdir so whitebox.download_wbt() sees it as done
            mkdir -p "${WBT_PKG_DIR}/WBT"
            cp "${WBT_EXE}" "${WBT_PKG_DIR}/WBT/whitebox_tools"
            chmod +x "${WBT_PKG_DIR}/WBT/whitebox_tools"
            # Persist to cache
            mkdir -p "${WBT_CACHE}"
            cp "${WBT_EXE}" "${WBT_CACHE}/whitebox_tools"
          fi

          # Verify the binary runs
          "${WBT_EXE}" --version

      - name: Bootstrap SWAT+ Linux engine (pinned release asset)
        run: |
          mkdir -p bin
          curl -L -o /tmp/swatplus-linux.zip \
            https://github.com/swat-model/swatplus/releases/download/61.0.2/swatplus-61.0.2-ifx-lin_x86_64-Rel.zip
          unzip -o /tmp/swatplus-linux.zip -d /tmp
          cp /tmp/swatplus-61.0.2-ifx-lin_x86_64-Rel bin/swatplus_exe
          chmod +x bin/swatplus_exe

      - name: Routing regression gate (multi-basin)
        env:
          SWATPLUS_BUILDER_RUN_ROUTING_REGRESSION: "1"
          # Tell whitebox.download_wbt() to skip auto-download since we've
          # already placed the binary in the package directory above.
          WBT_PATH: "1"
        run: |
          pytest -q tests/test_ci_routing_regression.py -s
