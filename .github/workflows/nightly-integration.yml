name: nightly-integration

# Live multi-basin routing-regression integration test: a full build + SWAT+
# engine run for several USGS basins against external services (USGS NLDI / 3DEP,
# MRLC NLCD, Microsoft Planetary Computer, USDA SDA) plus the WhiteboxTools and
# SWAT+ engine binaries.
#
# This is intentionally NOT part of the per-push `ci` workflow: any upstream
# service outage would otherwise block unrelated merges. It runs on a nightly
# schedule and can be triggered manually. Failures here flag a real regression
# OR an upstream-service problem — inspect the log before assuming a code bug.

on:
  schedule:
    # 07:00 UTC daily (~02:00 US Central) — off-peak for the US .gov services.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  routing-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          # libgomp1: OpenMP runtime that the pre-compiled WBT binary links against
          sudo apt-get install -y unzip openmpi-bin libgomp1

      - name: Install Python deps (full stack)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      # Cache the downloaded WBT binary across runs.  The cache key includes the
      # pyproject hash so a whitebox-python version bump re-downloads.
      - name: Cache WhiteboxTools binary
        id: cache-wbt
        uses: actions/cache@v4
        with:
          path: ~/.cache/whitebox_wbt
          key: wbt-linux-amd64-${{ hashFiles('**/pyproject.toml') }}

      - name: Pre-download WhiteboxTools binary
        run: python scripts/ci/install_wbt.py

      - name: Bootstrap SWAT+ Linux engine (pinned release asset)
        run: |
          mkdir -p bin
          curl -L -o /tmp/swatplus-linux.zip \
            https://github.com/swat-model/swatplus/releases/download/61.0.2/swatplus-61.0.2-ifx-lin_x86_64-Rel.zip
          unzip -o /tmp/swatplus-linux.zip -d /tmp
          cp /tmp/swatplus-61.0.2-ifx-lin_x86_64-Rel bin/swatplus_exe
          chmod +x bin/swatplus_exe

      - name: Routing regression gate (multi-basin)
        env:
          SWATPLUS_BUILDER_RUN_ROUTING_REGRESSION: "1"
          # Skip whitebox.download_wbt() at runtime — install_wbt.py already
          # placed a version-compatible binary in the package directory.
          WBT_PATH: "1"
        run: |
          pytest -q tests/test_ci_routing_regression.py -s
